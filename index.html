<!DOCTYPE html>
<html lang="es">
    <head>
        <title>Musikk</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <main class="page">
            <div class="nav-bar">
                <span>
                    <p>Musikk</p>
                    <span class="settings-btn">⚙</span> <!--☰-->
                </span>
                <div class="categorias">

                </div>
            </div>
            <div class="lista">
                <div class="titulo">
                    <span class="titulo-text">canciones</span>
                    <input class="titulo-search" type="text" placeholder="buscar">
                </div>
                <div class="canciones">
                    <span class="new-cancion">nombre</span>
                    <span class="new-cancion">nombre</span>
                </div>
            </div>
            <div class="reproductor">
                <span class="nombre-cancion">nombre cancion</span>
                <audio class="audio" src=""></audio>
                <video class="video" src=""></video>

                <input class="volume" type="range" min="0" max="1" value="1" step="0.1">
                <div class="controls">
                    <div class="buttons">
                        <button class="prev">⏮</button>
                        <button class="play">▶</button>
                        <button class="next">⏭</button>
                    </div>
                    <div class="buttons">
                        <button class="repetir">🔁</button>
                        <button class="random">🔢</button>
                    </div>

                    <span class="tiempo">1:00</span>
                    <div class="progress">
                        <div class="progress-bar"></div>
                    </div>
                </div>
                
                <div class="file-type">
                    <div>
                        <button class="video-type">video</button>
                        <button class="audio-type">audio</button>
                    </div>
                </div>
            </div>
        </main>

        <template class="categoria-tpl">
            <span class="new-categoria">⏸</span>
        </template>
        <template class="cancion-tpl">
            <span class="new-cancion">nombre</span>
        </template>
        
        <script src="script.js"></script>
    </body>
</html>
